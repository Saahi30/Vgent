# Render Blueprint — https://render.com/docs/blueprint-spec
services:
  # FastAPI backend
  - type: web
    name: vgent-api
    runtime: docker
    dockerfilePath: apps/api/Dockerfile
    dockerContext: apps/api
    plan: free
    healthCheckPath: /api/health
    envVars:
      - fromGroup: vgent-envs
      - key: REDIS_URL
        fromService:
          name: vgent-redis
          type: redis
          property: connectionString

  # Celery worker (for background tasks)
  - type: worker
    name: vgent-worker
    runtime: docker
    dockerfilePath: apps/api/Dockerfile
    dockerContext: apps/api
    plan: free
    dockerCommand: celery -A celery_app worker --loglevel=info
    envVars:
      - fromGroup: vgent-envs
      - key: REDIS_URL
        fromService:
          name: vgent-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: vgent-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: vgent-redis
          type: redis
          property: connectionString

  # Redis for Celery + caching
  - type: redis
    name: vgent-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

envVarGroups:
  - name: vgent-envs
    envVars:
