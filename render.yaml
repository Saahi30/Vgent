# Render Blueprint — https://render.com/docs/blueprint-spec
services:
  # FastAPI backend
  - type: web
    name: vgent-api
    runtime: docker
    dockerfilePath: apps/api/Dockerfile
    dockerContext: apps/api
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: API_SECRET_KEY
        sync: false
      - key: FERNET_ENCRYPTION_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: LIVEKIT_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: SARVAM_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: CARTESIA_API_KEY
        sync: false

  # Celery worker (for background tasks)
  - type: worker
    name: vgent-worker
    runtime: docker
    dockerfilePath: apps/api/Dockerfile
    dockerContext: apps/api
    plan: free
    dockerCommand: celery -A celery_app worker --loglevel=info
    envVars:
      - fromService: vgent-api
        type: envs
